<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Pagar · Suyu Streetwear</title><link rel="stylesheet" href="assets/css/styles.css"></head><body><div id="site-header"></div><main class="container"><h1 class="page-title">Pagar</h1><section class="checkout-grid"><form id="checkoutForm" onsubmit="event.preventDefault()"><h2>Contacto</h2><input id="email" class="field" type="email" placeholder="Correo electrónico" required><h2>Dirección de envío</h2><div class="form-row"><input id="name" class="field" placeholder="Nombre completo" required><input id="phone" class="field" placeholder="Teléfono"></div><input id="address" class="field" placeholder="Dirección" required><div class="form-row"><input id="city" class="field" placeholder="Ciudad"><input id="state" class="field" placeholder="Provincia / Estado"></div><div class="form-row"><input id="zip" class="field" placeholder="Código postal"><select id="country" class="field"><option value="PE">Perú</option><option value="US">Estados Unidos</option><option value="CL">Chile</option><option value="AR">Argentina</option><option value="MX">México</option><option value="CO">Colombia</option><option value="BR">Brasil</option><option value="UY">Uruguay</option><option value="BO">Bolivia</option><option value="ES">España</option></select></div><h2>Pago</h2><div id="paymentOptions" class="pay-options"></div></form><aside class="summary"><h2>Tu pedido</h2><div id="cartItems"></div><div class="summary-row"><span>Productos</span><strong class="subTotal"></strong></div><div class="summary-row"><span>Envío</span><strong class="shipTotal"></strong></div><div class="summary-row"><span>Total</span><strong class="grandTotal"></strong></div></aside></section></main><div id="site-footer"></div><div id="site-bottomnav"></div><div id="modal" class="modal" onclick="if(event.target.id==='modal')closeModal()"></div><div class="toast"></div><script src="assets/js/config.js"></script><script src="assets/js/fallback-products.js"></script><script src="assets/js/components.js"></script><script src="assets/js/app.js"></script></body></html>
